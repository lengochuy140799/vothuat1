<aside id="sidebar-container" class="w-64 bg-slate-900 text-slate-300 flex flex-col h-full border-r border-slate-800 shadow-xl">
  <!-- Brand Logo Header matches Screen Image 1 -->
  <div class="p-6 border-b border-slate-800">
    <div class="flex items-center gap-3">
      <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-600/30 flex items-center justify-center">
        <app-icon name="shield" class="w-6 h-6 text-white"></app-icon>
      </div>
      <div>
        <h1 class="text-white font-extrabold text-sm tracking-wide font-sans uppercase">CLB NGUYỄN THANH VŨ</h1>
        <p class="text-indigo-400 text-[9px] uppercase font-black tracking-widest mt-0.5">VÕ THUẬT CỔ TRUYỀN</p>
      </div>
    </div>
  </div>

  <!-- Navigation links -->
  <nav class="flex-1 px-4 py-6 space-y-1.5 font-sans">
    <button 
      (click)="selectTab('dashboard')"
      [class]="activeTab === 'dashboard' ? 'bg-indigo-600 text-white font-bold ring-4 ring-indigo-600/10' : 'hover:bg-slate-800/60 hover:text-white'"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs transition duration-150 cursor-pointer text-left"
    >
      <app-icon name="shield" class="w-4 h-4"></app-icon>
      <span>Bảng Điều Khiển</span>
    </button>

    <button 
      (click)="selectTab('students')"
      [class]="activeTab === 'students' ? 'bg-indigo-600 text-white font-bold ring-4 ring-indigo-600/10' : 'hover:bg-slate-800/60 hover:text-white'"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs transition duration-150 cursor-pointer text-left"
    >
      <app-icon name="users" class="w-4 h-4"></app-icon>
      <span>Hồ Sơ Võ Sinh</span>
    </button>

    <button 
      (click)="selectTab('exams')"
      [class]="activeTab === 'exams' ? 'bg-indigo-600 text-white font-bold ring-4 ring-indigo-600/10' : 'hover:bg-slate-800/60 hover:text-white'"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs transition duration-150 cursor-pointer text-left"
    >
      <app-icon name="calendar" class="w-4 h-4"></app-icon>
      <span>Đợt Thi Lên Đai</span>
    </button>

    <button 
      (click)="selectTab('registrations')"
      [class]="activeTab === 'registrations' ? 'bg-indigo-600 text-white font-bold ring-4 ring-indigo-600/10' : 'hover:bg-slate-800/60 hover:text-white'"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs transition duration-150 cursor-pointer text-left"
    >
      <app-icon name="file-check" class="w-4 h-4"></app-icon>
      <span>Ghi Danh Dự Thi</span>
    </button>

    <button 
      (click)="selectTab('fees')"
      [class]="activeTab === 'fees' ? 'bg-indigo-600 text-white font-bold ring-4 ring-indigo-600/10' : 'hover:bg-slate-800/60 hover:text-white'"
      class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-xs transition duration-150 cursor-pointer text-left"
    >
      <app-icon name="credit-card" class="w-4 h-4"></app-icon>
      <span>Sổ Quản Lý Thu Phí</span>
    </button>
  </nav>

  <!-- Open Info Band matches Screen design requirements -->
  <div *ngIf="openExamName" class="p-4 m-4 bg-slate-800/50 rounded-2xl border border-slate-800 animate-fadeIn">
    <span class="text-[10px] font-black text-rose-500 uppercase tracking-widest block font-sans">KỲ THI ĐANG MỞ</span>
    <p class="text-xs font-bold text-white mt-1 leading-normal truncate">{{ openExamName }}</p>
    <span class="inline-block mt-2 px-2 py-0.5 rounded bg-rose-500/10 text-[9px] font-bold text-rose-400 border border-rose-500/25">
      ● ĐANG TIẾP NHẬN HỒ SƠ
    </span>
  </div>

  <!-- Bottom simple card -->
  <div class="p-6 border-t border-slate-800 text-center">
    <p class="text-[10px] text-slate-500 font-extrabold uppercase tracking-widest">© Nguyễn Thanh Vũ v2.0</p>
  </div>
</aside>
