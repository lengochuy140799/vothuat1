<svg 
  xmlns="http://www.w3.org/2000/svg" 
  [attr.viewBox]="'0 0 24 24'" 
  fill="none" 
  stroke="currentColor" 
  [attr.stroke-width]="strokeWidth" 
  stroke-linecap="round" 
  stroke-linejoin="round" 
  [class]="class"
>
  <!-- Shield -->
  <ng-container *ngIf="name === 'shield'">
    <path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z" />
  </ng-container>

  <!-- Sparkles -->
  <ng-container *ngIf="name === 'sparkles'">
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
    <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5z" />
    <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z" />
  </ng-container>

  <!-- RefreshCcw -->
  <ng-container *ngIf="name === 'refresh'">
    <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
    <path d="M3 3v5h5" />
    <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
    <path d="M16 16h5v5" />
  </ng-container>

  <!-- Users -->
  <ng-container *ngIf="name === 'users'">
    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
    <circle cx="9" cy="7" r="4" />
    <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
  </ng-container>

  <!-- FileCheck2 -->
  <ng-container *ngIf="name === 'file-check'">
    <path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4" />
    <path d="M14 2v4a2 2 0 0 0 2 2h4" />
    <path d="m3 15 2 2 4-4" />
  </ng-container>

  <!-- Calendar -->
  <ng-container *ngIf="name === 'calendar'">
    <path d="M8 2v4" />
    <path d="M16 2v4" />
    <rect width="18" height="18" x="3" y="4" rx="2" />
    <path d="M3 10h18" />
  </ng-container>

  <!-- CreditCard -->
  <ng-container *ngIf="name === 'credit-card'">
    <rect width="20" height="14" x="2" y="5" rx="2" />
    <line x1="2" x2="22" y1="10" y2="10" />
  </ng-container>

  <!-- Receipt -->
  <ng-container *ngIf="name === 'receipt'">
    <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z" />
    <path d="M16 8H8" />
    <path d="M16 12H8" />
    <path d="M13 16H8" />
  </ng-container>

  <!-- Search -->
  <ng-container *ngIf="name === 'search'">
    <circle cx="11" cy="11" r="8" />
    <path d="m21 21-4.3-4.3" />
  </ng-container>

  <!-- Trash -->
  <ng-container *ngIf="name === 'trash'">
    <path d="M3 6h18" />
    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
  </ng-container>

  <!-- Edit -->
  <ng-container *ngIf="name === 'edit'">
    <path d="M12 20h9" />
    <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
  </ng-container>

  <!-- UserPlus -->
  <ng-container *ngIf="name === 'user-plus'">
    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
    <circle cx="9" cy="7" r="4" />
    <line x1="19" x2="19" y1="8" y2="14" />
    <line x1="22" x2="16" y1="11" y2="11" />
  </ng-container>

  <!-- Check -->
  <ng-container *ngIf="name === 'check'">
    <path d="M20 6 9 17l-5-5" />
  </ng-container>

  <!-- X -->
  <ng-container *ngIf="name === 'x'">
    <path d="M18 6 6 18" />
    <path d="m6 6 12 12" />
  </ng-container>

  <!-- Download -->
  <ng-container *ngIf="name === 'download'">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" />
    <polyline points="7 10 12 15 17 10" />
    <line x1="12" x2="12" y1="15" y2="3" />
  </ng-container>

  <!-- Upload -->
  <ng-container *ngIf="name === 'upload'">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4" />
    <polyline points="17 8 12 3 7 8" />
    <line x1="12" x2="12" y1="3" y2="15" />
  </ng-container>

  <!-- AlertCircle -->
  <ng-container *ngIf="name === 'alert'">
    <circle cx="12" cy="12" r="10" />
    <line x1="12" x2="12" y1="8" y2="12" />
    <line x1="12" x2="12.01" y1="16" y2="16" />
  </ng-container>

  <!-- HelpCircle -->
  <ng-container *ngIf="name === 'info'">
    <circle cx="12" cy="12" r="10" />
    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
    <line x1="12" x2="12.01" y1="17" y2="17" />
  </ng-container>
</svg>
