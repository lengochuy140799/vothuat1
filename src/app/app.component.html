<div id="app-container" class="flex h-screen overflow-hidden bg-slate-50 font-sans">
  <!-- 1. Left Navigation Sidebar -->
  <app-sidebar 
    [activeTab]="activeTab" 
    [openExamName]="(openSessionName$ | async) || ''"
    (activeTabChange)="onTabChange($event)"
  ></app-sidebar>

  <!-- 2. Right Workspace Content Area -->
  <div class="flex-1 flex flex-col h-full overflow-hidden">
    <!-- Top info bar with active session notification -->
    <app-header [openExamName]="openSessionName$ | async"></app-header>

    <!-- Main dynamic panel container -->
    <main class="flex-1 p-8 overflow-y-auto">
      <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- View A: Dashboard Overview -->
        <ng-container *ngIf="activeTab === 'dashboard'">
          <app-dashboard
            [students]="(students$ | async) || []"
            [sessions]="(sessions$ | async) || []"
            [registrations]="(registrations$ | async) || []"
            [activeSessionId]="(activeSessionId$ | async) || ''"
            (activeSessionIdChange)="onActiveSessionIdChange($event)"
            (notify)="onNotificationTrigger($event)"
          ></app-dashboard>
        </ng-container>

        <!-- View B: Students Profiles Management -->
        <ng-container *ngIf="activeTab === 'students'">
          <app-students
            [students]="(students$ | async) || []"
            (addStudent)="onAddStudent($event)"
            (updateStudent)="onUpdateStudent($event)"
            (deleteStudentId)="onDeleteStudentId($event)"
            (bulkImport)="onBulkImportStudents($event)"
            (notify)="onNotificationTrigger($event)"
          ></app-students>
        </ng-container>

        <!-- View C: Exam Sessions Scheduling -->
        <ng-container *ngIf="activeTab === 'exams'">
          <app-exams
            [sessions]="(sessions$ | async) || []"
            [registrations]="(registrations$ | async) || []"
            (addSession)="onAddSession($event)"
            (updateSession)="onUpdateSession($event)"
            (deleteSessionId)="onDeleteSessionId($event)"
            (notify)="onNotificationTrigger($event)"
          ></app-exams>
        </ng-container>

        <!-- View D: Ghi Danh Dự Thi Candidate Registration -->
        <ng-container *ngIf="activeTab === 'registrations'">
          <app-registrations
            [students]="(students$ | async) || []"
            [sessions]="(sessions$ | async) || []"
            [registrations]="(registrations$ | async) || []"
            [activeSessionId]="(activeSessionId$ | async) || ''"
            (activeSessionIdChange)="onActiveSessionIdChange($event)"
            (addRegistration)="onAddRegistration($event)"
            (deleteRegistrationId)="onDeleteRegistrationId($event)"
            (togglePayment)="onTogglePayment($event)"
            (notify)="onNotificationTrigger($event)"
          ></app-registrations>
        </ng-container>

        <!-- View E: Billings & Fee Tracks -->
        <ng-container *ngIf="activeTab === 'fees'">
          <app-fees
            [students]="(students$ | async) || []"
            [sessions]="(sessions$ | async) || []"
            [registrations]="(registrations$ | async) || []"
            [activeSessionId]="(activeSessionId$ | async) || ''"
            (activeSessionIdChange)="onActiveSessionIdChange($event)"
            (togglePayment)="onTogglePayment($event)"
            (updateRegistrationNotes)="onUpdateRegistrationNotes($event)"
            (notify)="onNotificationTrigger($event)"
          ></app-fees>
        </ng-container>

        <!-- Dynamic DB Reset Box (discreet at parent dashboard or footer context) -->
        <div class="pt-12 border-t border-slate-200/50 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs font-semibold text-slate-400">
          <span>Hệ thống cơ sở dữ liệu mẫu offline lưu trữ trình duyệt (localStorage).</span>
          <button 
            (click)="resetDatabase()" 
            class="bg-slate-200 hover:bg-rose-100 hover:text-rose-600 font-extrabold text-[10px] uppercase.tracking-wider px-3.5 py-2 rounded-xl transition duration-150 cursor-pointer text-slate-550 border border-slate-300 hover:border-rose-200"
          >
            🔄 KHÔI PHỤC DỮ LIỆU GỐC MABU SYSTEM
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- 3. System Alerts Toast Messages -->
  <div 
    *ngIf="(notification$ | async)?.show" 
    class="fixed bottom-6 right-6 bg-slate-900 border border-slate-800 text-slate-100 px-5 py-4 rounded-xl flex items-center gap-3 shadow-2xl z-50 animate-fadeIn"
  >
    <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
    <span class="text-xs font-bold leading-normal tracking-wide">
      {{ (notification$ | async)?.message }}
    </span>
  </div>
</div>
